name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build macOS binaries
        run: |
          npm run build
          npx pkg dist/index.js --targets node18-macos-arm64,node18-macos-x64 --out-path binaries

      - name: Sign and rename macOS binaries
        run: |
          codesign --sign - binaries/index-macos-arm64
          codesign --sign - binaries/index-macos-x64
          mv binaries/index-macos-arm64 binaries/llmkey-macos-arm64
          mv binaries/index-macos-x64   binaries/llmkey-macos-x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            binaries/llmkey-macos-arm64
            binaries/llmkey-macos-x64

  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Linux and Windows binaries
        run: |
          npm run build
          npx pkg dist/index.js --targets node18-linux-x64,node18-win-x64 --out-path binaries

      - name: Rename binaries
        run: |
          mv binaries/index-linux-x64   binaries/llmkey-linux-x64
          mv binaries/index-win-x64.exe binaries/llmkey-win-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: |
            binaries/llmkey-linux-x64
            binaries/llmkey-win-x64.exe

  release:
    needs: [build-macos, build-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: binaries

      - uses: actions/download-artifact@v4
        with:
          name: linux-windows-binaries
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/llmkey-macos-arm64
            binaries/llmkey-macos-x64
            binaries/llmkey-linux-x64
            binaries/llmkey-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
