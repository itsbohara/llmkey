name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build macOS binaries
        run: |
          mkdir -p binaries
          bun build bin/llmkey.js --compile --outfile binaries/llmkey-macos-arm64 --target bun-darwin-arm64
          bun build bin/llmkey.js --compile --outfile binaries/llmkey-macos-x64   --target bun-darwin-x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            binaries/llmkey-macos-arm64
            binaries/llmkey-macos-x64

  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Linux and Windows binaries
        run: |
          mkdir -p binaries
          bun build bin/llmkey.js --compile --outfile binaries/llmkey-linux-x64  --target bun-linux-x64
          bun build bin/llmkey.js --compile --outfile binaries/llmkey-win-x64.exe --target bun-windows-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: |
            binaries/llmkey-linux-x64
            binaries/llmkey-win-x64.exe

  release:
    needs: [build-macos, build-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: binaries

      - uses: actions/download-artifact@v4
        with:
          name: linux-windows-binaries
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/llmkey-macos-arm64
            binaries/llmkey-macos-x64
            binaries/llmkey-linux-x64
            binaries/llmkey-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
